<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <h1>My Library</h1>

  <button id="new-book-btn">New Book</button>

  <dialog id="book-dialog">
    <form id="book-form">
      <h2>Add Book</h2>

      <input
        type="text"
        id="title"
        placeholder="Title"
        required
      >

      <input
        type="text"
        id="author"
        placeholder="Author"
        required
      >

      <input
        type="number"
        id="pages"
        placeholder="Pages"
        required
      >

      <label>
        Read
        <input type="checkbox" id="read">
      </label>

      <button type="submit">Add Book</button>
      <button type="button" id="close-dialog">Cancel</button>
    </form>
  </dialog>

  <div id="library-container"></div>

  <script src="script.js"></script>
</body>
</html>
